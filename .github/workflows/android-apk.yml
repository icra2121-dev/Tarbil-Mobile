name: Android APK Oluştur ve Release Et

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-android:
    name: KOBUDS Android APK Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EXPO_PUBLIC_CBS_API_KEY: ${{ secrets.EXPO_PUBLIC_CBS_API_KEY }}
      EXPO_PUBLIC_CBS_API_URL: ${{ secrets.EXPO_PUBLIC_CBS_API_URL }}
      EXPO_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}
      EXPO_PUBLIC_KOBUKS_API_KEY: ${{ secrets.EXPO_PUBLIC_KOBUKS_API_KEY }}
      EXPO_PUBLIC_KOBUKS_API_URL: ${{ secrets.EXPO_PUBLIC_KOBUKS_API_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}

    steps:
      - name: Projeyi indir
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: NPM paketlerini kur
        run: npm ci

      - name: Ortam değişkenlerini oluştur
        run: |
          {
            echo "EXPO_PUBLIC_CBS_API_KEY=${EXPO_PUBLIC_CBS_API_KEY}"
            echo "EXPO_PUBLIC_CBS_API_URL=${EXPO_PUBLIC_CBS_API_URL}"
            echo "EXPO_PUBLIC_GOOGLE_MAPS_API_KEY=${EXPO_PUBLIC_GOOGLE_MAPS_API_KEY}"
            echo "EXPO_PUBLIC_KOBUKS_API_KEY=${EXPO_PUBLIC_KOBUKS_API_KEY}"
            echo "EXPO_PUBLIC_KOBUKS_API_URL=${EXPO_PUBLIC_KOBUKS_API_URL}"
            echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${EXPO_PUBLIC_SUPABASE_ANON_KEY}"
            echo "EXPO_PUBLIC_SUPABASE_URL=${EXPO_PUBLIC_SUPABASE_URL}"
          } > .env

      - name: Gradle çalıştırma izni ver
        run: chmod +x android/gradlew

      - name: Eski Android çıktısını temizle
        working-directory: android
        run: ./gradlew clean

      - name: Release APK oluştur
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: APK dosyasını köke al
        id: prepare
        run: |
          APK_NAME="KOBUDS-v5.2.1.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "$APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "tag_name=KOBUDS-5.2.1" >> "$GITHUB_OUTPUT"
          echo "release_name=KOBUDS 5.2.1" >> "$GITHUB_OUTPUT"

      - name: APK artefact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepare.outputs.apk_name }}
          path: ${{ steps.prepare.outputs.apk_name }}
          retention-days: 30
          if-no-files-found: error

      - name: GitHub Release oluştur
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare.outputs.tag_name }}
          name: ${{ steps.prepare.outputs.release_name }}
          files: ${{ steps.prepare.outputs.apk_name }}
          generate_release_notes: true